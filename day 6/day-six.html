<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="header">
            User Management System
        </h1>

        <section class="searchCard">
            <div>
                <input type="text" id="searchFname" placeholder="Search by First name">
            </div>
            <div>
               <label for="filterGrad">Graduation Status</label>
               <select id="filterGrad">
               <option value="all">All</option>
               <option value="Yes">Graduates</option>
               <option value="No">Under Graduates</option>
             </select>
            </div>
        </section>

        <section class="formCard">
            <h2 id="sectionTitle">Add User</h2>

            <div class="input-box">
                <div>
                    <label for="fname">First Name</label>
                    <input type="text" id="fname">
                </div>
                <div>
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname">
                </div>
                <div>
                    <label for="age">Age</label>
                    <input type="number" id="age">
                </div>
                <div>
                    <label id="isGrad">Graduated</label>
                    <div class="radio">
                        <div>
                            <input type="radio" id="yes" name="graduate" value="Yes">
                            <label for="yes">Yes</label>
                        </div>
                        <div>
                            <input type="radio" id="no" name="graduate" value="NO">
                            <label for="no">No</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="add">
                <button id="addBtn">Add</button>
            </div>
        </section>

        <section id="table">
            <table>
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Graduated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
            <div class="total">Total Students:</div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
